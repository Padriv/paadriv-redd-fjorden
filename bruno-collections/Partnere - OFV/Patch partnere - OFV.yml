info:
  name: Patch partnere - OFV
  type: http
  seq: 3

http:
  method: PATCH
  url: https://api.airtable.com/v0/{{app}}/{{table}}/{{record}}
  body:
    type: json
    data: |-
      {
        "fields": {
          "Navn på organisasjon": "Test",
          "Organisasjonsnummer": 123,
          "Navn kontaktperson": "Test",
          "Epost kontaktperson": "test@bekk.no",
          "Tlf kontaktperson": "1111111",
          "Kompetanse" : ["Sirkulær økonomi"],
          "Samtykke": "Jeg samtykker"
        }
      }
  auth: inherit

runtime:
  variables:
    - name: record
      value: <må settes>

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
