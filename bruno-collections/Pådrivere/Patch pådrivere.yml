info:
  name: Patch pådrivere
  type: http
  seq: 2

http:
  method: PATCH
  url: https://api.airtable.com/v0/{{app}}/{{table}}/{{record}}
  body:
    type: json
    data: |
      {
        "fields": {
              "Navn": "Fornavn Etternavn",
              "Telefon": "12345678",
              "Epost": "Epost",
              "Virksomhet": "Organisasjon",
              "Prosjekt" : ["recNvM7EFsQDHRd57"],
              "Samtykke": "Jeg samtykker",
              "Samtykke offentliggjøre kontaktinfo": true
        }
      }
  auth: inherit

runtime:
  variables:
    - name: record
      value: <Må settes>

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
